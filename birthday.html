<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Amina</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #ffcbd1 0%, #f8a5c2 100%);
            font-family: 'Great Vibes', cursive;
        }

        .container {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* --- PHOTO --- */
        .photo-frame {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- CAKE --- */
        .cake {
            position: relative;
            width: 150px;
            height: 100px;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 40px;
            border-radius: 10px 10px 5px 5px;
        }

        .layer-bottom {
            bottom: 0;
            background: #6d4c41;
            box-shadow: inset 0 -5px 10px rgba(0, 0, 0, 0.3);
        }

        .layer-top {
            bottom: 30px;
            background: #fff;
            height: 35px;
            z-index: 1;
        }

        .icing-drips {
            position: absolute;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 2;
        }

        .drip {
            width: 15px;
            height: 20px;
            background: #fff;
            border-radius: 0 0 10px 10px;
        }

        /* --- CANDLE --- */
        .candle {
            position: absolute;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 45px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff80ab 5px, #ff80ab 10px);
            z-index: 3;
            border-radius: 3px;
        }

        .flame {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 26px;
            background: radial-gradient(circle, #ffeb3b, #ff9800);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ffeb3b, 0 0 40px #ff9800;
            animation: flicker 0.6s infinite alternate;
        }

        /* --- TEXT --- */
        .text {
            font-size: 3.5rem;
            color: #c2185b;
            font-weight: 700;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8);
        }

        /* --- ANIMATIONS --- */
        @keyframes flicker {
            from {
                transform: translateX(-50%) scale(1);
                opacity: 0.9;
            }

            to {
                transform: translateX(-50%) scale(1.25);
                opacity: 1;
            }
        }

        .confetti {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="photo-frame">
            <img src="/image/ammy.jpeg" alt="Amina">
        </div>

        <div class="cake">
            <div class="candle">
                <div class="flame"></div>
            </div>
            <div class="layer layer-top">
                <div class="icing-drips">
                    <div class="drip" style="height: 22px;"></div>
                    <div class="drip" style="height: 28px;"></div>
                    <div class="drip" style="height: 20px;"></div>
                    <div class="drip" style="height: 32px;"></div>
                    <div class="drip" style="height: 24px;"></div>
                </div>
            </div>
            <div class="layer layer-bottom"></div>
        </div>

        <div class="text">Happy Birthday my Love Amina</div>

    </div>

    <script>
        // Continuous confetti creation
        function createConfetti() {
            const conf = document.createElement("div");
            conf.className = "confetti";
            const colors = ['#ffffff', '#ffeb3b', '#f48fb1', '#ad1457', '#ffd1dc'];

            const size = Math.random() * 12 + 5 + "px";
            conf.style.width = size;
            conf.style.height = size;
            conf.style.background = colors[Math.floor(Math.random() * colors.length)];

            conf.style.left = Math.random() * 100 + "vw";
            conf.style.top = "-10vh";

            const duration = (Math.random() * 3 + 2);
            conf.style.animation = fall ${ duration }s linear forwards;

            document.body.appendChild(conf);

            setTimeout(() => { conf.remove(); }, duration * 1000);
        }

        // Keep spawning confetti continuously
        setInterval(createConfetti, 150);
    </script>

</body>

</html>
